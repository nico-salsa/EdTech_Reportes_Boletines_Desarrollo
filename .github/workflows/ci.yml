name: integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-openspec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Validate OpenSpec change
        run: openspec validate asdd-local-functional-realignment

  validate-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Validate frontend
        run: pnpm --dir frontend build

  validate-backend:
    runs-on: ubuntu-latest
    needs:
      - validate-openspec
      - validate-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Validate backend build, tests and coverage
        working-directory: backend
        run: chmod +x ./gradlew && ./gradlew build
