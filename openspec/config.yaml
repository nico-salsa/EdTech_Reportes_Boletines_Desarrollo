schema: spec-driven

context: |
  Proyecto: EdTech
  Objetivo actual: construir un MVP local para docentes.
  Frontend local en localhost con React, Vite y TypeScript.
  Backend local en localhost con Java 21, Spring Boot y SQLite.
  Exportacion requerida en PDF, HTML y JSON.
  Motor PDF propuesto: OpenHTMLtoPDF a partir de una plantilla HTML.
  Historias del MVP: HDU_1, HDU_2, HDU_3, HDU_5, HDU_11, HDU_12, HDU_13, HDU_14 y HDU_15.
  La autenticacion del MVP es simple: username y password, sin roles ni recuperacion de contrasena.
  La unicidad de los cursos aplica por docente.
  El boletin individual debe ser simple pero correcto.
  Convenciones: commits atomicos, en espanol y usando Conventional Commits.
  Restriccion: PRD.md, SUBTASKS.md y USER_STORIES.md no deben subirse a GitHub.

# Project context (optional)
